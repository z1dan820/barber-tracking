<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121826">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex justify-center items-center p-0 sm:p-4">

    <div x-data="app()" class="w-full max-w-md h-[100vh] sm:h-[90vh] bg-gray-900 sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden relative border border-gray-800">
        
        <div class="px-6 pt-8 pb-4 bg-gray-900 z-10">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">BarberLog</h1>
            <p class="text-gray-400 text-xs mt-1">Catat & Pantau Penghasilanmu</p>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 px-6 relative">
            
            <div class="flex p-1 bg-gray-800 rounded-xl mb-6 sticky top-0 z-20 backdrop-blur-md bg-opacity-80">
                <button @click="tab = 'input'" :class="tab === 'input' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 text-xs font-medium rounded-lg transition-all">Input</button>
                <button @click="tab = 'dashboard'" :class="tab === 'dashboard' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 text-xs font-medium rounded-lg transition-all">Riwayat</button>
                <button @click="tab = 'settings'" :class="tab === 'settings' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 text-xs font-medium rounded-lg transition-all">Pengaturan</button>
            </div>

            <div x-show="tab === 'input'" x-transition.opacity>
                <div class="mb-4">
                    <label class="text-xs text-gray-500 uppercase font-bold tracking-wider">Tanggal</label>
                    <input type="date" x-model="inputDate" class="w-full mt-2 bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="space-y-3">
                    <template x-if="services.length === 0">
                        <p class="text-gray-500 text-sm text-center py-4">Belum ada paket. Buat di menu Pengaturan.</p>
                    </template>
                    <template x-for="srv in services" :key="srv.id">
                        <div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-sm" x-text="srv.label"></h3>
                                <p class="text-xs text-gray-400">
                                    <span x-text="formatRupiah(srv.price)"></span> 
                                    <span class="text-blue-400 ml-1" x-text="`(Bagi: ${srv.commission}%)`"></span>
                                </p>
                            </div>
                            <div class="flex items-center space-x-3 bg-gray-900 rounded-lg p-1">
                                <button @click="if(counts[srv.id] > 0) counts[srv.id]--" class="w-8 h-8 rounded bg-gray-800 text-gray-300 hover:bg-gray-700 flex items-center justify-center">-</button>
                                <span class="w-6 text-center font-mono font-bold" x-text="counts[srv.id] || 0"></span>
                                <button @click="counts[srv.id] = (counts[srv.id] || 0) + 1" class="w-8 h-8 rounded bg-blue-600 text-white hover:bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/30">+</button>
                            </div>
                        </div>
                    </template>
                </div>
                <div class="h-24"></div> 
            </div>

            <div x-show="tab === 'dashboard'" x-transition.opacity style="display: none;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-white">Bulan Ini</h2>
                    <input type="month" x-model="filterMonth" @change="filterData()" class="bg-gray-800 text-xs text-white px-3 py-1 rounded-lg border border-gray-700">
                </div>

                <div class="bg-gradient-to-br from-gray-800 to-gray-900 border border-gray-700 rounded-2xl p-6 mb-6 relative overflow-hidden">
                    <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-500 rounded-full opacity-20 blur-2xl"></div>
                    <p class="text-gray-400 text-sm mb-1">Total Penghasilan Bersih</p>
                    <h2 class="text-3xl font-bold text-white tracking-tight" x-text="formatRupiah(totalIncome)"></h2>
                    <div class="mt-4 flex gap-2">
                         <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30">Omset: <span x-text="formatRupiah(totalOmset)"></span></span>
                    </div>
                </div>

                <div class="space-y-2 mb-8">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Riwayat Bulan Ini</h3>
                    <template x-for="rec in filteredRecords" :key="rec.id">
                        <div class="bg-gray-800/40 rounded-xl p-3 flex justify-between items-center border border-gray-800">
                            <div>
                                <p class="text-xs text-gray-400" x-text="formatDate(rec.date)"></p>
                                <p class="text-sm font-bold text-white mt-0.5" x-text="rec.summary"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-blue-400" x-text="formatRupiah(rec.income)"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-8 border-t border-gray-800 pt-6">
                    <button @click="clearRecords()" class="w-full py-3 rounded-xl border border-red-900/50 text-red-500 text-xs hover:bg-red-900/20 transition-colors">
                        ⚠ Hapus Riwayat Bulan Ini
                    </button>
                </div>
                <div class="h-24"></div> 
            </div>

            <div x-show="tab === 'settings'" x-transition.opacity style="display: none;">
                <h2 class="text-lg font-bold text-white mb-4">Pengaturan Harga & Paket</h2>
                
                <div class="space-y-4 mb-6">
                    <template x-for="(srv, index) in services" :key="srv.id">
                        <div class="bg-gray-800 border border-gray-700 p-4 rounded-xl relative">
                            <button @click="removeService(index)" class="absolute top-2 right-2 text-red-400 hover:text-red-300 bg-red-400/10 p-1.5 rounded-lg text-xs font-bold">Hapus</button>
                            
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="text-[10px] text-gray-400 uppercase">Nama Paket</label>
                                    <input type="text" x-model="srv.label" class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 mt-1">
                                </div>
                                <div>
                                    <label class="text-[10px] text-gray-400 uppercase">Singkatan (Misal: D)</label>
                                    <input type="text" x-model="srv.short" class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 mt-1">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] text-gray-400 uppercase">Harga (Rp)</label>
                                    <input type="number" x-model.number="srv.price" class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 mt-1">
                                </div>
                                <div>
                                    <label class="text-[10px] text-gray-400 uppercase">Bagihasil Capster (%)</label>
                                    <input type="number" x-model.number="srv.commission" class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 mt-1">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <button @click="addService()" class="w-full py-3 mb-4 rounded-xl border border-dashed border-gray-600 text-gray-400 text-sm hover:border-gray-400 hover:text-white transition-colors">
                    + Tambah Paket Baru
                </button>

                <button @click="saveSettings()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all mb-12">
                    Simpan Pengaturan
                </button>
                <div class="h-24"></div>
            </div>

        </div>

        <div x-show="tab === 'input'" class="absolute bottom-6 left-0 right-0 px-6 z-30">
            <button @click="saveDailyRecord()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/40 transition-all active:scale-95 flex justify-center items-center gap-2">
                <span>Simpan Hari Ini</span>
            </button>
        </div>
    </div>

    <script>
        function app() {
            return {
                tab: 'input',
                inputDate: new Date().toISOString().split('T')[0],
                filterMonth: new Date().toISOString().slice(0, 7),
                records: [],
                filteredRecords: [],
                totalIncome: 0,
                totalOmset: 0,
                
                // Variabel untuk dynamic settings
                services: [],
                counts: {},

                // Konfigurasi Default (dipakai kalau database setting masih kosong)
                defaultServices: [
                    { id: 'id_1', label: 'Dewasa', short: 'D', price: 40000, commission: 50 },
                    { id: 'id_2', label: 'Remaja', short: 'R', price: 30000, commission: 50 },
                    { id: 'id_3', label: 'Anak', short: 'A', price: 25000, commission: 50 },
                    { id: 'id_4', label: 'Paket 1', short: 'P1', price: 50000, commission: 55 }
                ],

                async init() {
                    await this.fetchSettings();
                    await this.fetchRecords();
                },

                // --- FUNGSI PENGATURAN (SETTINGS) ---
                async fetchSettings() {
                    try {
                        const res = await fetch('/api/settings');
                        const json = await res.json();
                        
                        if (json.data && json.data.length > 0) {
                            this.services = json.data;
                        } else {
                            // Kalau kosong, tembak default ke database
                            this.services = JSON.parse(JSON.stringify(this.defaultServices));
                            await this.saveSettings(true); // true = silent save
                        }
                        this.resetCounts();
                    } catch (e) { console.error("Gagal load settings:", e); }
                },

                addService() {
                    this.services.push({
                        id: 'id_' + Date.now(), // Generate ID unik
                        label: 'Layanan Baru',
                        short: 'NEW',
                        price: 0,
                        commission: 50
                    });
                },

                removeService(index) {
                    if(confirm('Hapus paket ini?')) {
                        this.services.splice(index, 1);
                    }
                },

                async saveSettings(silent = false) {
                    try {
                        await fetch('/api/settings', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ services: this.services })
                        });
                        this.resetCounts();
                        if(!silent) alert("Pengaturan berhasil diperbarui!");
                    } catch (e) {
                        alert("Gagal menyimpan pengaturan.");
                    }
                },

                // --- FUNGSI TRANSAKSI / INPUT ---
                resetCounts() {
                    this.counts = {};
                    this.services.forEach(srv => {
                        this.counts[srv.id] = 0;
                    });
                },

                async fetchRecords() {
                    try {
                        const res = await fetch('/api/records');
                        const json = await res.json();
                        this.records = json.data || [];
                        this.filterData();
                    } catch (e) { console.error(e); }
                },

                filterData() {
                    this.filteredRecords = this.records.filter(r => r.date.startsWith(this.filterMonth));
                    this.totalIncome = this.filteredRecords.reduce((acc, curr) => acc + curr.income, 0);
                    this.totalOmset = this.filteredRecords.reduce((acc, curr) => acc + curr.omset, 0);
                },

                async saveDailyRecord() {
                    let totalItems = 0;
                    let dailyOmset = 0;
                    let dailyIncome = 0;
                    let summaryArr = [];

                    // Kalkulasi berdasarkan HARGA SAAT INI (Snapshot)
                    this.services.forEach(srv => {
                        const count = this.counts[srv.id] || 0;
                        if (count > 0) {
                            totalItems += count;
                            const omset = count * srv.price;
                            const income = omset * (srv.commission / 100);
                            
                            dailyOmset += omset;
                            dailyIncome += income;
                            summaryArr.push(`${srv.short}:${count}`);
                        }
                    });

                    if (totalItems === 0) return alert("Pilih minimal 1 pangkas!");

                    const summaryText = summaryArr.join('  ');

                    // Kirim ke backend (kita simpan summary teks dan angka matangnya)
                    await fetch('/api/records', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            date: this.inputDate, 
                            summary: summaryText, 
                            income: dailyIncome, 
                            omset: dailyOmset 
                        })
                    });

                    this.resetCounts();
                    alert("Data hari ini berhasil disimpan!");
                    await this.fetchRecords();
                    this.tab = 'dashboard';
                },

                async clearRecords() {
                    if(!confirm("Yakin ingin menghapus SEMUA riwayat transaksi? (Pengaturan paket tidak akan terhapus)")) return;
                    await fetch('/api/clear', { method: 'DELETE' });
                    await this.fetchRecords();
                },

                formatRupiah(num) {
                    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);
                },
                
                formatDate(dateStr) {
                    return new Date(dateStr).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
                }
            }
        }
    
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('SW Fail', err));
            });
        }
    </script>
</body>
</html>
